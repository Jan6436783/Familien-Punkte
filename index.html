<!DOCTYPE html>  
<html lang="de">  
<head>  
  <meta charset="UTF-8">  
  <title>Familien Punkte</title>  
  <style>  
    body { font-family: Arial; background: #f2f2f2; text-align: center; margin:0; }  
    h1 { background: #4CAF50; color: white; padding: 15px; margin: 0; }  
    .top { margin: 20px; }  
    input { padding:8px; font-size:14px; margin:3px; border-radius:6px; border:1px solid #ccc; }  
    button { padding:8px; margin:3px; border:none; border-radius:8px; cursor:pointer; }  
    .addBtn { background:#4CAF50; color:white; }  
    .green { background:#4CAF50; color:white; }  
    .red { background:#f44336; color:white; }  
    .orange { background:orange; color:white; }  
    .card { background:white; margin:15px auto; padding:15px; border-radius:12px; width:260px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }  
    .name { font-size:20px; font-weight:bold; }  
    .error { color:red; font-size:12px; }  
  </style>  
</head>  
<body>  
  
<h1>📱 Familien Punkte</h1>  
  
<div class="top" id="adminControls">  
  <input type="text" id="nameInput" placeholder="Name eingeben">  
  <button class="addBtn" id="addUserBtn">Hinzufügen</button>  
</div>  
  
<div id="users"></div>  
  
<script type="module">  
  // 1. Firebase Module laden
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, onValue, push, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // 2. Deine Firebase Konfiguration
  const firebaseConfig = {  
    apiKey: "AIzaSyAGjv4a03o8gQFZ2XxjV--KG-Nnc58LLhw",  
    authDomain: "familienpunkte-cec1a.firebaseapp.com",  
    databaseURL: "https://familienpunkte-cec1a-default-rtdb.firebaseio.com",  
    projectId: "familienpunkte-cec1a",  
    storageBucket: "familienpunkte-cec1a.firebasestorage.app",  
    messagingSenderId: "648175206394",  
    appId: "1:648175206394:web:f07cd74f7a93d8708bae43"  
  };  

  // 3. Firebase initialisieren
  const app = initializeApp(firebaseConfig);  
  const db = getDatabase(app);
  const usersRef = ref(db, 'users');
  const devicesRef = ref(db, 'devices');

  // 4. Geräte-Identifikation & Rollen
  let deviceID = localStorage.getItem("deviceID");
  if(!deviceID){
    deviceID = 'dev-' + Date.now();
    localStorage.setItem("deviceID", deviceID);
  }

  let myRole = "view";
  let currentUsers = {};

  // Rollen in Echtzeit prüfen
  onValue(devicesRef, (snapshot) => {
    const devices = snapshot.val() || {};
    const deviceList = Object.values(devices);
    const existing = deviceList.find(d => d.id === deviceID);

    if(!existing) {
      if(deviceList.length === 0) myRole = "add";
      else if(deviceList.length === 1) myRole = "subtract";
      else myRole = "view";
      push(devicesRef, {id: deviceID, role: myRole});
    } else {
      myRole = existing.role;
    }

    // Controls anzeigen/verstecken
    document.getElementById("adminControls").style.display = (myRole === "add") ? "block" : "none";
  });

  // 5. Daten aus Firebase laden (Echtzeit!)
  onValue(usersRef, (snapshot) => {
    currentUsers = snapshot.val() || {};
    render();
  });

  // 6. Funktionen (Global verfügbar machen für die Buttons)
  window.addUser = function() {
    const nameInput = document.getElementById("nameInput");
    const name = nameInput.value.trim();
    if(!name || myRole !== "add") return;
    
    const newUserRef = push(usersRef);
    set(newUserRef, { name: name, points: 0 });
    nameInput.value = "";
  };

  document.getElementById("addUserBtn").onclick = window.addUser;

  window.addPoint = function(id) {
    if(myRole !== "add") return;
    update(ref(db, `users/${id}`), { points: currentUsers[id].points + 1 });
  };

  window.subtractMinutes = function(id) {
    if(myRole !== "subtract") return;
    const input = document.getElementById("input-"+id);
    const mins = parseFloat(input.value);
    if(!mins || mins <= 0) return;
    
    const currentMins = currentUsers[id].points * 2;
    if(mins > currentMins) return alert("Zu viele Minuten!");
    
    update(ref(db, `users/${id}`), { points: (currentMins - mins) / 2 });
    input.value = "";
  };

  window.resetUser = function(id) {
    if(myRole === "view") return;
    update(ref(db, `users/${id}`), { points: 0 });
  };

  // 7. Die Anzeige bauen
  function render(){  
    const container = document.getElementById("users");  
    container.innerHTML = "";  
    
    Object.keys(currentUsers).forEach(id => {
      const user = currentUsers[id];
      const minutes = user.points * 2;  
      container.innerHTML += `  
        <div class="card">  
          <div class="name">${user.name}</div>  
          <div>⭐ Punkte: ${user.points}</div>  
          <div>⏱️ Minuten: ${minutes}</div>  
          ${myRole === "add" ? `<button class="green" onclick="addPoint('${id}')">+ Punkt</button>` : ""}  
          ${myRole !== "view" ? `<button class="red" onclick="resetUser('${id}')">Reset</button>` : ""}  
          <br><br>  
          ${myRole === "subtract" ? `
            <input id="input-${id}" type="number" placeholder="Minuten">  
            <button class="orange" onclick="subtractMinutes('${id}')">Abziehen</button>
          ` : ""}  
        </div>  
      `;  
    });  
  }
</script>  
  
</body>  
</html>
