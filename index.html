<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Familien Punkte</title>
  <style>
    :root {
      --primary: #4CAF50;
      --danger: #f44336;
      --warning: #ff9800;
      --bg: #f0f2f5;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); text-align: center; margin: 0; padding-bottom: 50px; }
    h1 { background: var(--primary); color: white; padding: 20px; margin: 0; font-size: 24px; }
    
    /* Login Screen */
    #loginScreen { padding: 50px 20px; }
    .login-box { background: white; padding: 30px; border-radius: 20px; max-width: 300px; margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .role-btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; color: white; }
    .btn-mama { background: #e91e63; }
    .btn-jannis { background: #2196f3; }
    .btn-gast { background: #9e9e9e; }

    /* App Styles */
    #mainApp { display: none; padding: 20px; }
    .admin-panel { margin: 10px auto 25px; max-width: 350px; background: white; padding: 15px; border-radius: 15px; display: none; }
    input { padding: 12px; font-size: 16px; margin: 5px; border-radius: 8px; border: 1px solid #ddd; width: 70%; }
    
    button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .add-btn { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
    
    .card { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 320px; margin: 15px auto; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-left: 8px solid var(--primary); }
    .name { font-size: 22px; font-weight: bold; margin-bottom: 10px; }
    .score-box { display: flex; justify-content: space-around; background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
    .stat-val { font-size: 18px; font-weight: bold; display: block; }
    .stat-label { font-size: 11px; color: #888; }

    .btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .btn-plus { background: var(--primary); color: white; }
    .btn-minus { background: var(--warning); color: white; }
    .btn-reset { background: var(--danger); color: white; font-size: 12px; }
    
    #logoutBtn { position: absolute; top: 20px; right: 10px; background: white; color: black; font-size: 12px; border: 1px solid #ccc; }
  </style>
</head>
<body>

<div id="loginScreen">
  <h1>Wer bist du?</h1>
  <div class="login-box">
    <button class="role-btn btn-mama" onclick="login('mama')">Mama</button>
    <button class="role-btn btn-jannis" onclick="login('jannis')">Jannis</button>
    <button class="role-btn btn-gast" onclick="login('gast')">Andere (Gast)</button>
  </div>
</div>

<div id="mainApp">
  <button id="logoutBtn" onclick="location.reload()">Abmelden</button>
  <h1 id="welcomeTitle">📱 Familien Punkte</h1>

  <div class="admin-panel" id="jannisControls">
    <input type="text" id="nameInput" placeholder="Neues Kind...">
    <button class="add-btn" id="addUserBtn">Hinzufügen</button>
  </div>

  <div id="users"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, onValue, push, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAGjv4a03o8gQFZ2XxjV--KG-Nnc58LLhw",
    authDomain: "familienpunkte-cec1a.firebaseapp.com",
    databaseURL: "https://familienpunkte-cec1a-default-rtdb.firebaseio.com",
    projectId: "familienpunkte-cec1a",
    storageBucket: "familienpunkte-cec1a.firebasestorage.app",
    messagingSenderId: "648175206394",
    appId: "1:648175206394:web:f07cd74f7a93d8708bae43"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const usersRef = ref(db, 'users');

  let myRole = "gast"; // Rollen: 'jannis', 'mama', 'gast'
  let currentUsers = {};

  window.login = function(role) {
    if (role === 'mama') {
      let pw = prompt("Passwort für Mama:");
      if (pw !== "mama123") return alert("Falsch!");
      myRole = "mama";
    } else if (role === 'jannis') {
      let pw = prompt("Passwort für Jannis:");
      if (pw !== "jannis123") return alert("Falsch!");
      myRole = "jannis";
    } else {
      myRole = "gast";
    }

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    
    // Nur Jannis sieht das Hinzufügen-Panel
    document.getElementById("jannisControls").style.display = (myRole === "jannis") ? "block" : "none";
    
    loadData();
  };

  function loadData() {
    onValue(usersRef, (snapshot) => {
      currentUsers = snapshot.val() || {};
      render();
    });
  }

  window.addUser = function() {
    const input = document.getElementById("nameInput");
    if(input.value.trim() && myRole === "jannis") {
      push(usersRef, { name: input.value.trim(), points: 0 });
      input.value = "";
    }
  };
  document.getElementById("addUserBtn").onclick = window.addUser;

  window.changePoint = (id, amount) => {
    // Mama darf nur abziehen (amount = -1)
    if(myRole === "mama" && amount > 0) return; 
    // Gast darf gar nichts
    if(myRole === "gast") return;

    let newPoints = (currentUsers[id].points || 0) + amount;
    if(newPoints < 0) newPoints = 0;
    update(ref(db, `users/${id}`), { points: newPoints });
  };

  window.resetUser = (id) => {
    if((myRole === "jannis" || myRole === "mama") && confirm("Wirklich löschen?")) {
      update(ref(db, `users/${id}`), { points: 0 });
    }
  };

  function render() {
    const container = document.getElementById("users");
    container.innerHTML = "";
    Object.entries(currentUsers).forEach(([id, user]) => {
      const card = document.createElement("div");
      card.className = "card";
      
      let buttonsHtml = "";
      
      if (myRole === "jannis") {
        buttonsHtml = `
          <div class="btn-row">
            <button class="btn-plus" onclick="changePoint('${id}', 1)">+ 1 Punkt</button>
            <button class="btn-minus" onclick="changePoint('${id}', -1)">- 1 Punkt</button>
            <button class="btn-reset" onclick="resetUser('${id}')">Reset</button>
          </div>
        `;
      } else if (myRole === "mama") {
        buttonsHtml = `
          <div class="btn-row">
            <button class="btn-minus" onclick="changePoint('${id}', -1)">- 1 Punkt</button>
            <button class="btn-reset" onclick="resetUser('${id}')">Reset</button>
          </div>
        `;
      } else {
        buttonsHtml = `<p style="font-size:12px; color:gray;">Nur Lesezugriff</p>`;
      }

      card.innerHTML = `
        <div class="name">${user.name}</div>
        <div class="score-box">
          <div class="stat"><span class="stat-val">${user.points}</span><span class="stat-label">Punkte</span></div>
          <div class="stat"><span class="stat-val">${user.points * 2}</span><span class="stat-label">Minuten</span></div>
        </div>
        ${buttonsHtml}
      `;
      container.appendChild(card);
    });
  }
</script>
</body>
</html>
